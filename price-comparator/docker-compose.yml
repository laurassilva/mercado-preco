services:
  postgres:
    image: postgres:16-alpine
    container_name: pricecomp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pricecomparator}
      POSTGRES_USER: ${POSTGRES_USER:-priceuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-priceuser} -d ${POSTGRES_DB:-pricecomparator}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pricecomp_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricecomp_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seeds &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricecomp_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricecomp_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-priceuser}:${POSTGRES_PASSWORD:-pricepassword}@postgres:5432/${POSTGRES_DB:-pricecomparator}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - worker
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pricecomp_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: pricecomp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
